name: .NET CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore SudoBank2/
    
    - name: Build
      run: dotnet build SudoBank2/ --configuration Release --no-restore
    
    - name: Run application
      run: dotnet run --project SudoBank2/SudoBank2/SudoBank2.csproj --configuration Release < /dev/null || echo "Application completed"
